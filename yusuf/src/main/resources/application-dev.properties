# ECO:Digit Config
ecodigit.hostname=localhost
ecodigit.http=http
# Yusuf config
yusuf.port=8080
# Arthur
# CHANGE THIS IN YOUR INSTALLATION!
arthur.service.url=http://192.168.1.2:5000
## Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
## Postgres
spring.datasource.postgres.jdbcUrl=jdbc:postgresql://database:5432/testbench_db
spring.datasource.postgres.username=ecodigit
spring.datasource.postgres.password=ecodigit2425
logging.level.org.springframework.web=debug
## Minio
minio.endpoint=http://minio:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
## RabbitMQ
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=rabbitmq
spring.rabbitmq.password=rabbitmqpassword
# Keycloak
# External: from browser (Host Port 8081)
keycloak.external.url=${ecodigit.http}://localhost:8081

# Internal: from Docker view (Yusuf container -> Keycloak container)
keycloak.internal.url=http://keycloak:8080
#/auth
# Fake SMTP-Server (Mailhog)
spring.mail.host=mailhog
spring.mail.port=1025
spring.mail.username=test@ecodigit.de
spring.mail.password=test
#For production both needs to be set to true
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
