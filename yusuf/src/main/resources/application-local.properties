# ECO:Digit Config
ecodigit.hostname=localhost
ecodigit.http=http
# Yusuf config
yusuf.port=8080
# Arthur
arthur.service.url=http://localhost:5000
# Cobb
frontend.base-url=${ecodigit.http}://${ecodigit.hostname}:4200
app.base-url=${ecodigit.http}://${ecodigit.hostname}:${yusuf.port}${api.base-url}
frontend.sessioncookie.name=JSESSIONID
## Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
## Postgres
spring.datasource.postgres.jdbcUrl=jdbc:postgresql://localhost:5432/testbench_db
spring.datasource.postgres.username=ecodigit
spring.datasource.postgres.password=ecodigit2425
logging.level.org.springframework.web=debug
## Minio
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
## RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=rabbitmq
spring.rabbitmq.password=rabbitmqpassword
# Keycloak
keycloak.external.url=${ecodigit.http}://${ecodigit.hostname}:8090
keycloak.internal.url=${ecodigit.http}://${ecodigit.hostname}:8080
spring.security.oauth2.client.registration.keycloak.redirect-uri=${app.base-url}/login/oauth2/code/keycloak
# Fake SMTP-Server (Mailhog)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@ecodigit.de
spring.mail.password=test
#For production both needs to be set to true
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
