emailVerificationBodyHtml=<h1>Verify your email</h1><p>Someone has created a {2} account with this email address.</p><p> If this was you, click the link below to verify your email address.</p><p><a href="{0}">Link to email address verification</a></p><p>This link will expire within {3}.</p><p>If you did not create this account, just ignore this message.</p>
passwordResetBodyHtml=<h1>Forgot your password?</h1><p>Someone just requested to change your {2} account''s credentials. If this was you, click on the link below to reset them.</p><p><a href="{0}">Link to reset credentials</a></p><p>This link will expire within {3}.</p><p>If you do not want to reset your credentials, just ignore this message and nothing will be changed.</p>
