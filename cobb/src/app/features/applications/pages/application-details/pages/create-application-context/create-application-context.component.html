<div class="dialog-container">
  <div class="icon-title-container">
    <mat-icon class="plus-icon">add</mat-icon>
    <h2 class="mat-headline-small">Create New Application Context</h2>
    <p class="mat-body-medium">
      You must first create an Application Context to measure your environmental
      impact indicators.
    </p>
  </div>
  <form [formGroup]="form">
    <div class="input-row">
      <mat-form-field class="custom-form-field" appearance="outline">
        <mat-label>Application context name</mat-label>
        <input matInput formControlName="appName" />
        @if (hasAppNameRequiredError()) {
          <mat-error>Application context name is required</mat-error>
        }
      </mat-form-field>

      <mat-form-field class="custom-form-field" appearance="outline">
        <mat-label>Application description</mat-label>
        <input matInput type="text" formControlName="description" />
      </mat-form-field>
    </div>
    <mat-dialog-actions class="button-container">
      <button mat-button mat-dialog-close class="cancel-button">Cancel</button>
      <button mat-flat-button (click)="onSubmit()" [disabled]="form.invalid">
        <mat-icon>check</mat-icon>Save Application Context
      </button>
    </mat-dialog-actions>
  </form>
</div>
