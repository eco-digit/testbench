<div (click)="$event.stopPropagation()" class="dialog-container">
  <div class="dialog-container__icon-title-container">
    <mat-icon>upload</mat-icon>
    <h2 mat-dialog-title class="mat-headline-small">Upload Artifacts</h2>
    <p class="mat-body-medium">
      Upload an Application Variant including Infrastructure and Usage Scenario.
    </p>
  </div>

  <form [formGroup]="uploadArtifactsForm">
    <mat-dialog-content>
      <!-- File Dropzone -->
      <div
        class="file-dropzone"
        (dragover)="onDrag($event, true)"
        (dragleave)="onDrag($event, false)"
        (drop)="onFileDrop($event)"
        [class.dragover]="isDragOver"
      >
        <div class="file-dropzone__dropzone-content">
          @if (!fileName) {
            <div class="file-dropzone__dropzone-row">
              <p class="file-dropzone__drop-text">
                Drop files here to upload...
              </p>
              <button
                mat-stroked-button
                type="button"
                (click)="fileInput.click()"
              >
                browse files
              </button>
            </div>
          } @else {
            <div class="file-dropzone__file-preview">
              <span>{{ fileName }}</span>
              <mat-icon
                type="button"
                (click)="removeFile()"
                aria-label="Remove file"
                >delete</mat-icon
              >
            </div>
          }
        </div>

        <input
          #fileInput
          type="file"
          accept=".zip"
          hidden
          (change)="onFileSelected($event)"
        />
      </div>
      @if (fileTypeError) {
        <mat-error class="error-message"
          >Please upload a .zip file only</mat-error
        >
      }

      <div class="input-row__upload">
        <mat-form-field
          class="input-row__custom-form-field"
          appearance="outline"
        >
          <mat-label>Artifact Name</mat-label>
          <input matInput formControlName="artifactName" />
        </mat-form-field>
      </div>

      <div class="input-row__upload">
        <mat-form-field
          class="input-row__custom-form-field"
          appearance="outline"
        >
          <mat-label>Artifact Description</mat-label>
          <input matInput type="text" formControlName="description" />
        </mat-form-field>
      </div>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
      <button mat-button mat-dialog-close>Cancel</button>
      <button
        mat-flat-button
        color="primary"
        [mat-dialog-close]="true"
        [disabled]="!fileName"
        (click)="onSubmit()"
      >
        <mat-icon>upload</mat-icon>
        Upload
      </button>
    </mat-dialog-actions>
  </form>
</div>
