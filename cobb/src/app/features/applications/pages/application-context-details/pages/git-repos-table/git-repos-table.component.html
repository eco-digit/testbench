<div class="all-git-repos__container">
  <table
    mat-table
    [dataSource]="dataSource"
    class="mat-elevation-z8"
    aria-label="Git Repository Table"
  >
    <ng-container matColumnDef="gitRepositoryName">
      <th mat-header-cell *matHeaderCellDef>Git repository name</th>
      <td mat-cell *matCellDef="let element">{{ element.repositoryName }}</td>
    </ng-container>

    <ng-container matColumnDef="accesstype">
      <th mat-header-cell *matHeaderCellDef>Access type</th>
      <td mat-cell *matCellDef="let element">{{ element.accessType }}</td>
    </ng-container>

    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef>Created at</th>
      <td mat-cell *matCellDef="let element">
        {{ formatLocalDateTime(element.creationDate) }}
      </td>
    </ng-container>

    <ng-container matColumnDef="link">
      <th mat-header-cell *matHeaderCellDef>Link</th>
      <td mat-cell *matCellDef="let element">{{ element.repositoryLink }}</td>
    </ng-container>

    <ng-container matColumnDef="plusIcon">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let element">
        <button mat-button (click)="startMeasurementWithGitRepo(element.id)">
          <mat-icon>add</mat-icon>
        </button>
      </td>
    </ng-container>

    <ng-container matColumnDef="deleteIcon">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let element">
        <button mat-button (click)="deleteGitRepo(element.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
  <mat-paginator
    [length]="dataSource.data.length"
    [pageSize]="5"
    [pageSizeOptions]="[5, 10, 20, 50, 100]"
    aria-label="Select page"
  ></mat-paginator>
</div>
