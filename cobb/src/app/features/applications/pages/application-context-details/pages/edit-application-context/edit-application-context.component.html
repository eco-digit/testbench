<div class="dialog-container">
  <div class="icon-title-container">
    <mat-icon class="plus-icon">edit</mat-icon>
    <h2 class="mat-headline-small">Edit Applicationcontext?</h2>
  </div>
  <form [formGroup]="form">
    <div class="input-row">
      <mat-form-field class="custom-form-field" appearance="outline">
        <mat-label>Applicationcontext Name</mat-label>
        <input matInput formControlName="contextName" />
        @if (hasAppNameRequiredError()) {
          <mat-error>Applicationcontextname is required</mat-error>
        }
      </mat-form-field>

      <mat-form-field class="custom-form-field" appearance="outline">
        <mat-label>Applicationcontext Description</mat-label>
        <input matInput type="text" formControlName="description" />
      </mat-form-field>
    </div>
    <mat-dialog-actions class="button-container">
      <button mat-button mat-dialog-close class="cancel-button">Cancel</button>
      <button mat-flat-button (click)="onSubmit()" [disabled]="form.invalid">
        <mat-icon>check</mat-icon>Save Applicationcontext
      </button>
    </mat-dialog-actions>
  </form>
</div>
