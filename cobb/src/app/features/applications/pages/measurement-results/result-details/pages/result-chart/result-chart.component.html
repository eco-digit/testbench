<div class="chart__container">
  <div class="chart__box-title">
    <p class="mat-title-medium">ECO:DIGIT Score</p>
    <p class="mat-body-small">Calculated per measurement phase</p>
  </div>

  <div class="chart__canvas">
    <canvas #chartCanvas></canvas>
  </div>

  <div class="chart__legend">
    <div class="chart__legend-item">
      <div class="chart__legend-ellipse per-phase"></div>
      <p class="chart mat-label-small">Per Phase</p>
    </div>
    <div class="chart__legend-item">
      <div class="chart__legend-ellipse cumulative"></div>
      <p class="chart mat-label-small">Cumulative</p>
    </div>
  </div>
</div>
